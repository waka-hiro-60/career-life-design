<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="時代進・キャリア＆ライフデザイン研究所へのお問い合わせ。執筆依頼・講演依頼・感想など、お気軽にご連絡ください。">
  <title>お問い合わせ｜協進化ジャーナル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:      #1a4a3a;
      --green-dark: #0f2f24;
      --gold:       #c9a84c;
      --gold-light: #e8c97a;
      --cream:      #f8f5f0;
      --cream-dark: #ede9e2;
      --text:       #2a2a2a;
      --text-light: #5a5a5a;
      --white:      #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--text);
      background: var(--cream);
      line-height: 1.8;
    }

    /* ── ヘッダー ── */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(26,74,58,0.97);
      backdrop-filter: blur(8px);
      z-index: 100;
      height: 60px;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 100%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-logo {
      font-family: 'Noto Serif JP', serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.05em;
      line-height: 1.3;
    }
    .header-logo span {
      display: block;
      font-size: 0.65rem;
      font-weight: 400;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.08em;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .header-nav {
      display: flex; gap: 2rem;
    }
    .header-nav a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .header-nav a:hover { color: var(--gold); }

    /* ── ページヘッダー ── */
    .page-hero {
      background: linear-gradient(160deg, var(--green-dark) 0%, var(--green) 100%);
      padding: 8rem 2rem 4rem;
      text-align: center;
    }
    .page-hero-label {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1rem;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .page-hero h1 {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.05em;
      line-height: 1.4;
    }

    /* ── セクション共通 ── */
    section { padding: 5rem 2rem; }
    .container { max-width: 680px; margin: 0 auto; }
    .divider {
      width: 40px; height: 2px;
      background: var(--gold);
      margin-bottom: 2rem;
    }

    /* ── フォームセクション ── */
    .contact-section { background: var(--white); }

    .contact-lead {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 2;
      margin-bottom: 2.5rem;
    }

    .form-group {
      margin-bottom: 1.75rem;
    }
    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--green);
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .form-label .required {
      color: var(--gold);
      margin-left: 0.25rem;
      font-size: 0.72rem;
    }
    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--cream-dark);
      background: var(--cream);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      border-radius: 2px;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }
    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(26,74,58,0.08);
    }
    .form-textarea {
      height: 180px;
      resize: vertical;
      line-height: 1.8;
    }
    .form-select-wrap {
      position: relative;
    }
    .form-select-wrap::after {
      content: '▼';
      position: absolute;
      right: 1rem; top: 50%;
      transform: translateY(-50%);
      font-size: 0.6rem;
      color: var(--text-light);
      pointer-events: none;
    }

    .form-submit {
      width: 100%;
      padding: 1rem;
      background: var(--green);
      color: var(--gold);
      border: none;
      font-family: 'Noto Serif JP', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
    }
    .form-submit:hover { background: var(--green-dark); }
    .form-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ── 送信結果メッセージ ── */
    .form-message {
      display: none;
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      border-radius: 2px;
      font-size: 0.9rem;
      line-height: 1.7;
    }
    .form-message.success {
      background: #f0f9f4;
      border: 1px solid #a8d5b8;
      color: #1a4a3a;
    }
    .form-message.error {
      background: #fdf0f0;
      border: 1px solid #e8a8a8;
      color: #6a1a1a;
    }

    /* ── フッター ── */
    .site-footer { background: var(--green-dark); }
    .footer-inner {
      padding: 3rem 2rem 2rem;
      text-align: center;
    }
    .footer-logo {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 0.25rem;
    }
    .footer-tagline {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    .footer-links {
      display: flex; justify-content: center;
      flex-wrap: wrap; gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .footer-links a {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--gold); }
    .footer-bottom {
      padding: 1rem 2rem;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .footer-copy {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em;
    }

    /* ── レスポンシブ ── */
    @media (max-width: 640px) {
      .header-nav { display: none; }
      .footer-links { gap: 1rem; }
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header class="site-header">
  <div class="header-inner">
    <a href="/" class="header-logo">
      協進化ジャーナル
      <span>Career &amp; Life Design Lab</span>
    </a>
    <div class="header-nav">
      <a href="/journal/">ジャーナル</a>
      <a href="/books/">書籍</a>
      <a href="/about/">研究所</a>
      <a href="/contact/">お問い合わせ</a>
    </div>
  </div>
</header>

<!-- ページヘッダー -->
<div class="page-hero">
  <p class="page-hero-label">Contact</p>
  <h1>お問い合わせ</h1>
</div>

<!-- フォーム -->
<section class="contact-section">
  <div class="container">
    <div class="divider"></div>
    <p class="contact-lead">
      執筆依頼・講演依頼・感想・ご質問など、お気軽にご連絡ください。<br>
      通常3営業日以内にご返信いたします。
    </p>

    <form action="https://ssgform.com/s/xr357tgkf36S" method="post">
      <div class="form-group">
        <label class="form-label" for="name">
          お名前<span class="required">*</span>
        </label>
        <input class="form-input" type="text" id="name" name="お名前" required placeholder="山田 太郎">
      </div>

      <div class="form-group">
        <label class="form-label" for="email">
          メールアドレス<span class="required">*</span>
        </label>
        <input class="form-input" type="email" id="email" name="メールアドレス" required placeholder="example@email.com">
      </div>

      <div class="form-group">
        <label class="form-label" for="subject">
          お問い合わせの種類<span class="required">*</span>
        </label>
        <div class="form-select-wrap">
          <select class="form-select" id="subject" name="お問い合わせの種類" required>
            <option value="" disabled selected>選択してください</option>
            <option value="執筆依頼">執筆依頼</option>
            <option value="講演依頼">講演依頼</option>
            <option value="感想・応援">感想・応援</option>
            <option value="社労士相談">社労士相談</option>
            <option value="その他">その他</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="message">
          メッセージ<span class="required">*</span>
        </label>
        <textarea class="form-textarea" id="message" name="メッセージ" required placeholder="メッセージをご記入ください。"></textarea>
      </div>

      <button type="submit" class="form-submit">送信する</button>
    </form>
  </div>
</section>

<!-- フッター -->
<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-logo">協進化ジャーナル</p>
    <p class="footer-tagline">生きることは、育てること。</p>
    <div class="footer-links">
      <a href="/journal/">ジャーナル</a>
      <a href="/books/">書籍</a>
      <a href="/about/">研究所</a>
      <a href="https://kyoshinkajournal.substack.com" target="_blank">Substack</a>
      <a href="/contact/">お問い合わせ</a>
      <a href="https://career-life.group" target="_blank">career-life.group</a>
      <a href="https://career-life.tech" target="_blank">career-life.tech</a>
      <a href="https://career-life.support" target="_blank">career-life.support</a>
    </div>
  </div>
  <div class="footer-bottom">
    <p class="footer-copy">© 2026 キャリア＆ライフデザイン研究所</p>
  </div>
</footer>



</body>
</html>
