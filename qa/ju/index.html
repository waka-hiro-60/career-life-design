<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠 住まい｜Q&A | 時代進 キャリア＆ライフデザイン研究所</title>
<meta name="description" content="住まい・住み替え・相続・空き家——時代進が当事者として問い、研究者として答えます。準備中。">
<link rel="stylesheet" href="/assets/css/common.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --green:#1a4a3a; --green-dark:#0f2f24; --gold:#c9a84c; --cream:#f8f6f2; --border:#e0dbd2; --text:#2a2a2a; --muted:#6b6460; --white:#ffffff; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);line-height:1.8;}
.site-header{position:fixed;top:0;left:0;right:0;background:rgba(26,74,58,0.97);backdrop-filter:blur(8px);z-index:100;height:60px;}
.header-inner{max-width:1100px;margin:0 auto;padding:0 2rem;height:100%;display:flex;align-items:center;justify-content:space-between;}
.site-logo{font-family:'Noto Serif JP',serif;font-weight:700;font-size:1rem;color:var(--gold);text-decoration:none;letter-spacing:0.05em;line-height:1.3;}
.site-logo span{display:block;font-size:0.65rem;font-weight:400;color:rgba(255,255,255,0.6);}
.header-nav{display:flex;gap:2rem;}
.header-nav a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.85rem;transition:color 0.2s;}
.header-nav a:hover{color:var(--gold);}
.nav-qa{color:var(--gold)!important;font-weight:700;}
@media(max-width:640px){.header-nav{display:none;}}
.breadcrumb{margin-top:60px;background:var(--cream);border-bottom:1px solid var(--border);padding:9px 24px;font-size:11px;color:var(--muted);}
.breadcrumb-inner{max-width:1100px;margin:0 auto;display:flex;gap:6px;align-items:center;}
.breadcrumb a{color:var(--green);text-decoration:none;}
.hero{background:var(--green);padding:60px 24px;text-align:center;}
.hero-emoji{font-size:48px;margin-bottom:16px;}
.hero h1{font-family:'Noto Serif JP',serif;font-size:28px;font-weight:700;color:var(--white);margin-bottom:12px;}
.hero p{font-size:13px;color:rgba(255,255,255,.65);max-width:480px;margin:0 auto;}
.coming{max-width:560px;margin:60px auto;padding:0 24px 80px;text-align:center;}
.coming-badge{display:inline-block;background:var(--gold);color:#0f2f24;font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:.1em;margin-bottom:24px;}
.coming-text{font-size:14px;color:var(--muted);line-height:2;margin-bottom:32px;}
.back-link{display:inline-block;color:var(--green);text-decoration:none;font-size:13px;border:1px solid var(--green);padding:10px 24px;border-radius:4px;transition:all .2s;}
.back-link:hover{background:var(--green);color:var(--white);}
.site-footer{background:var(--green-dark);}
.footer-inner{padding:3rem 2rem 2rem;text-align:center;}
.footer-logo{font-family:'Noto Serif JP',serif;font-size:1.2rem;font-weight:700;color:var(--gold);margin-bottom:.25rem;}
.footer-tagline{font-size:.8rem;color:rgba(255,255,255,.5);letter-spacing:.1em;margin-bottom:2rem;}
.footer-links{display:flex;justify-content:center;flex-wrap:wrap;gap:1.5rem;margin-bottom:1.5rem;}
.footer-links a{color:rgba(255,255,255,.6);text-decoration:none;font-size:.82rem;transition:color .2s;}
.footer-links a:hover{color:var(--gold);}
.footer-bottom{padding:1rem 2rem;text-align:center;border-top:1px solid rgba(255,255,255,.08);}
.footer-copy{font-size:.72rem;color:rgba(255,255,255,.3);}
</style>
</head>
<body>
<div id="site-header"></div>
<nav class="breadcrumb">
  <div class="breadcrumb-inner">
    <a href="/">ホーム</a><span>›</span><a href="/qa/">Q&amp;A</a><span>›</span>🏠 住まい
  </div>
</nav>
<div class="hero">
  <div class="hero-emoji">🏠</div>
  <h1>住まい</h1>
  <p>住まい・住み替え・相続・空き家</p>
</div>
<div class="coming">
  <span class="coming-badge">COMING SOON</span>
  <p class="coming-text">このカテゴリーのQ&Aは現在準備中です。<br>順次公開していきます。<br>まずは「働く」カテゴリーをご覧ください。</p>
  <a href="/qa/" class="back-link">← Q&amp;A トップに戻る</a>
</div>
<div id="site-footer"></div>
<script src="/assets/js/common.js"></script>
</body>
</html>
